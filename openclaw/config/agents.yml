# config/agents.yml
# OpenClaw agent config for RustAssistant stack.
# Place at $OPENCLAW_CONFIG_DIR/agents.yml
#
# LLM calls route through ra-app:3500/v1 (RustAssistant's OpenAI-compatible proxy).
# ra-app handles Ollama local / Grok remote routing automatically.

agents:
    defaults:
        model: auto # RustAssistant ModelRouter classifies and routes each prompt
        max_tokens: 4096

        system_prompt: |
            You are a focused developer assistant monitoring the RustAssistant project.
            You have read-only access to GitHub and CI/CD pipelines, and semantic search
            access to indexed session notes and codebase context via RustAssistant.

            Your responsibilities:
            1. PRE-SESSION BRIEF — when asked, summarise recent commits, failing pipelines,
               open PRs, and relevant context from past session notes.
            2. POST-SESSION WRAP — generate a dated markdown summary of the session:
               commits made, pipeline outcomes, unresolved issues, and a prioritised TODO
               list for next time. Index it into RustAssistant for future retrieval.
            3. CI/CD WATCH — notify Discord when a GitHub Actions run fails or a deployment
               completes. Include workflow name, branch, and a link to the run.
            4. ON-DEMAND RESEARCH — answer questions about the codebase using semantic search
               over indexed session notes and source embeddings.

            Always be concise. Never attempt GitHub write operations.
            Never access email, calendar, or services not listed in this config.

        tools:
            github:
                enabled: true
                token_env: GITHUB_TOKEN
                readonly: true
                watch:
                    - repos: "*"
                      events:
                          - push
                          - pull_request
                          - workflow_run
                          - check_suite

            cicd:
                github_actions:
                    enabled: true
                    poll_interval_seconds: 120

            discord:
                enabled: true
                token_env: DISCORD_BOT_TOKEN
                allowed_channel_ids:
                    - "1400290154345664703"

            # RustAssistant semantic memory — HTTP tools calling ra-app over internal network
            http_tools:
                ra_search:
                    description: "Semantic search over indexed session notes and codebase embeddings"
                    method: POST
                    url: "${RA_BASE_URL}/api/v1/search"
                    headers:
                        Authorization: "Bearer ${RA_API_KEY}"
                        Content-Type: "application/json"
                    body_template: |
                        {"query": "{{query}}", "limit": 5}

                ra_ingest:
                    description: "Index a document into RustAssistant for future retrieval"
                    method: POST
                    url: "${RA_BASE_URL}/api/v1/documents"
                    headers:
                        Authorization: "Bearer ${RA_API_KEY}"
                        Content-Type: "application/json"
                    body_template: |
                        {"content": "{{content}}", "title": "{{title}}", "doc_type": "session_note"}

                ra_health:
                    description: "Check RustAssistant service health"
                    method: GET
                    url: "${RA_BASE_URL}/healthz"

            filesystem:
                enabled: true
                allow_write_paths:
                    - /home/node/.openclaw/workspace/sessions
                    - /home/node/.openclaw/workspace/notes

            email: { enabled: false }
            calendar: { enabled: false }
            browser: { enabled: false }
            shell: { enabled: false }

        memory:
            enabled: true
            storage: file
            summarise_after_turns: 20

    # ── session-scribe ────────────────────────────────────────────────────────
    # End of session:  @openclaw session-scribe wrap
    session-scribe:
        inherits: defaults
        system_prompt: |
            You are the session scribe. When invoked:
            1. Fetch all commits, PR activity, and workflow runs since the last summary
               timestamp stored in memory.
            2. Write a markdown summary to /workspace/sessions/YYYY-MM-DD.md:
               - Commits (hash, message, repo)
               - Pipeline outcomes (pass/fail, workflow name)
               - Open PRs and their status
               - Patterns worth flagging (repeated failures, stale PRs)
               - Numbered TODO list for next session, ordered by priority
            3. Call ra_ingest to index the summary into RustAssistant:
               title: "Session YYYY-MM-DD", doc_type: "session_note"
            4. Update memory with the current timestamp as the new baseline.
            5. Post a concise summary to Discord (5 lines max).

    # ── briefer ───────────────────────────────────────────────────────────────
    # Start of session:  @openclaw brief
    briefer:
        inherits: defaults
        system_prompt: |
            You are the pre-session briefer. When invoked:
            1. Fetch commits and pipeline runs since the last session timestamp in memory.
            2. Call ra_search with the current date and any topic hints from the user
               to surface relevant prior session notes.
            3. Post a Discord briefing (10 lines max):
               - What changed since last session (N commits, M repos)
               - Any failing pipelines and their names
               - Top 3 items from the last session TODO list
               - Relevant semantic context from past notes
            Keep it scannable — the goal is a 30-second read before starting work.
