# docker-compose.yml — RustAssistant + OpenClaw
# Oryx server ports: app→3500, postgres→5433, redis→6380, ollama→11434
# OpenClaw gateway→18789/18790 (Tailscale-bound only)
# Tailscale runs on the host — no sidecar needed.

services:
    # ── RustAssistant API ─────────────────────────────────────────────────────
    ra-app:
        build:
            context: .
            dockerfile: docker/rustassistant/Dockerfile
        image: ${RA_IMAGE:-nuniesmith/rustassistant:latest}
        container_name: ra-app
        depends_on:
            ra-postgres:
                condition: service_healthy
            ra-redis:
                condition: service_healthy
        environment:
            DATABASE_URL: postgres://rustassistant:${RA_POSTGRES_PASSWORD}@ra-postgres:5432/rustassistant
            REDIS_URL: redis://:${RA_REDIS_PASSWORD}@ra-redis:6379
            OLLAMA_BASE_URL: http://ra-ollama:11434
            LOCAL_MODEL: qwen2.5-coder:7b
            XAI_API_KEY: ${XAI_API_KEY}
            XAI_MODEL: ${XAI_MODEL:-grok-4-fast}
            GITHUB_TOKEN: ${GITHUB_TOKEN:-}
            GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
            # Proxy auth key — shared with OpenClaw and futures app
            RA_PROXY_API_KEYS: ${RA_PROXY_API_KEYS}
            HOST: 0.0.0.0
            PORT: "3500"
            RUST_LOG: info
            SQLX_OFFLINE: "true"
            CACHE_ENABLED: "true"
            CACHE_PREFIX: "rustassistant:"
            MULTI_TENANT_MODE: "false"
            TELEMETRY_ENABLED: "false"
            ANALYTICS_ENABLED: "true"
            TZ: ${TZ:-America/Toronto}
        ports:
            # Bind to Tailscale IP only — not exposed to internet
            - "${TAILSCALE_IP:?set TAILSCALE_IP to your tailscale0 address}:3500:3500"
        volumes:
            - ra-data:/app/data
            - ra-docs:/app/docs
            - ra-workspace:/app/workspace
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://127.0.0.1:3500/health"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 30s

    # ── Postgres ──────────────────────────────────────────────────────────────
    ra-postgres:
        image: postgres:16-alpine
        container_name: ra-postgres
        environment:
            POSTGRES_USER: rustassistant
            POSTGRES_PASSWORD: ${RA_POSTGRES_PASSWORD}
            POSTGRES_DB: rustassistant
        volumes:
            - ra-postgres-data:/var/lib/postgresql/data
        ports:
            - "${TAILSCALE_IP}:5433:5432"
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rustassistant"]
            interval: 10s
            timeout: 5s
            retries: 5

    # ── Redis ─────────────────────────────────────────────────────────────────
    ra-redis:
        image: redis:7-alpine
        container_name: ra-redis
        command: >
            redis-server
            --requirepass ${RA_REDIS_PASSWORD}
            --maxmemory 384mb
            --maxmemory-policy allkeys-lru
        volumes:
            - ra-redis-data:/data
        ports:
            - "${TAILSCALE_IP}:6380:6379"
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${RA_REDIS_PASSWORD}", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    # ── Ollama (local LLM) ────────────────────────────────────────────────────
    # Optional: only starts when the "ollama" profile is active.
    #   docker compose --profile ollama up -d
    #   ./run.sh up              ← starts without Ollama
    #   ./run.sh up --ollama     ← starts with Ollama
    ra-ollama:
        image: ollama/ollama:latest
        container_name: ra-ollama
        profiles: [ollama]
        environment:
            OLLAMA_NUM_GPU: 0 # set to 1 once nvidia-container-toolkit is fixed (todo #2)
        volumes:
            - ra-ollama-data:/root/.ollama
        ports:
            - "${TAILSCALE_IP}:11434:11434"
        restart: unless-stopped
        # Uncomment once GPU passthrough is fixed:
        # deploy:
        #   resources:
        #     reservations:
        #       devices:
        #         - driver: nvidia
        #           count: 1
        #           capabilities: [gpu]

    # ── Ollama model puller (one-shot) ────────────────────────────────────────
    ra-ollama-init:
        image: ollama/ollama:latest
        container_name: ra-ollama-init
        profiles: [ollama]
        depends_on:
            - ra-ollama
        entrypoint: >
            sh -c "sleep 5 && ollama pull qwen2.5-coder:7b"
        environment:
            OLLAMA_HOST: http://ra-ollama:11434
        restart: "no"

    # ── OpenClaw Gateway ──────────────────────────────────────────────────────
    # Discord bot + GitHub polling. Routes LLM calls through ra-app's proxy
    # so Ollama/Grok routing is centralised in RustAssistant, not duplicated.
    # Bound to Tailscale IP only — never reachable from internet.
    openclaw-gateway:
        # Build from source: ./docker/openclaw/build.sh
        # Or pull upstream:  ./docker/openclaw/build.sh --pull ghcr.io/openclaw/openclaw:latest
        build:
            context: .
            dockerfile: docker/openclaw/Dockerfile
            args:
                OPENCLAW_BASE_IMAGE: ${OPENCLAW_BASE_IMAGE:-openclaw-base:local}
        image: ${OPENCLAW_IMAGE:-openclaw:local}
        container_name: openclaw-gateway
        depends_on:
            ra-app:
                condition: service_healthy
        environment:
            HOME: /home/node
            TERM: xterm-256color
            TZ: ${TZ:-America/Toronto}

            OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

            # LLM routed through RustAssistant's OpenAI-compatible proxy.
            # ra-app handles Ollama local / Grok remote routing automatically.
            OPENAI_API_BASE: http://ra-app:3500/v1
            OPENAI_API_KEY: ${RA_PROXY_API_KEYS}

            # Discord — token kept so the gateway can use it once the plugin is fixed
            DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}

            # GitHub readonly (reuse the deploy PAT — already has repo read scope)
            GITHUB_TOKEN: ${GITHUB_TOKEN}
            GITHUB_USERNAME: ${GITHUB_USERNAME:-}
            GITHUB_ORG: ${GITHUB_ORG:-}

            # RustAssistant direct API — semantic memory search + session ingestion
            RA_BASE_URL: http://ra-app:3500
            RA_API_KEY: ${RA_PROXY_API_KEYS}

        volumes:
            - openclaw-config:/home/node/.openclaw
            - openclaw-workspace:/home/node/.openclaw/workspace
            - ./openclaw/config/openclaw.json:/home/node/.openclaw/openclaw.json:ro
        ports:
            - "${TAILSCALE_IP}:18789:18789"
            - "${TAILSCALE_IP}:18790:18790"
            # localhost binding — gives the browser a secure context for the Control UI
            - "127.0.0.1:18789:18789"
            - "127.0.0.1:18790:18790"
        init: true
        restart: unless-stopped
        command:
            - node
            - openclaw.mjs
            - gateway
            - --bind
            - lan
            - --port
            - "18789"
            - --allow-unconfigured
        healthcheck:
            test:
                - CMD
                - node
                - -e
                - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 20s

    # ── OpenClaw CLI / Agent ──────────────────────────────────────────────────
    openclaw-cli:
        image: ${OPENCLAW_IMAGE:-openclaw:local}
        container_name: openclaw-cli
        network_mode: "service:openclaw-gateway"
        cap_drop:
            - NET_RAW
            - NET_ADMIN
        security_opt:
            - no-new-privileges:true
        depends_on:
            - openclaw-gateway
        environment:
            HOME: /home/node
            TERM: xterm-256color
            TZ: ${TZ:-America/Toronto}
            OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
            OPENAI_API_BASE: http://ra-app:3500/v1
            OPENAI_API_KEY: ${RA_PROXY_API_KEYS}
            BROWSER: echo
        volumes:
            - openclaw-config:/home/node/.openclaw
            - openclaw-workspace:/home/node/.openclaw/workspace
        stdin_open: true
        tty: true
        init: true
        entrypoint: ["node", "openclaw.mjs"]

volumes:
    ra-postgres-data:
    ra-redis-data:
    ra-ollama-data:
    ra-data:
    ra-docs:
    ra-workspace:
    openclaw-config:
    openclaw-workspace:
